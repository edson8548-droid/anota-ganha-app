<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7FBF"/>
      <stop offset="100%" stop-color="#1A4F7A"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E8B3A"/>
      <stop offset="100%" stop-color="#5DC84A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9930A"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#bgGrad)"/>

  <!-- V azul -->
  <polygon points="14,20 36,20 55,70 74,20 96,20 55,82" fill="url(#vGrad)"/>

  <!-- Brilho dourado base -->
  <ellipse cx="55" cy="80" rx="18" ry="7" fill="url(#goldGrad)" opacity="0.85"/>

  <!-- Barras verdes -->
  <rect x="48" y="62" width="8" height="20" rx="2" fill="url(#greenGrad)" opacity="0.9"/>
  <rect x="59" y="52" width="8" height="30" rx="2" fill="url(#greenGrad)" opacity="0.95"/>
  <rect x="70" y="40" width="8" height="42" rx="2" fill="url(#greenGrad)"/>

  <!-- Seta verde -->
  <line x1="48" y1="64" x2="82" y2="32" stroke="#5DC84A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="82,32 74,36 80,42" fill="#5DC84A"/>

  <!-- Nome VENPRO -->
  <text x="126" y="58" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" fill="#1B3A5C" letter-spacing="1">VEN</text>
  <text x="222" y="58" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" fill="#2E7FBF" letter-spacing="1">PRO</text>

  <!-- Linha dourada -->
  <rect x="126" y="68" width="228" height="2" rx="1" fill="url(#goldGrad)"/>

  <!-- Tagline -->
  <text x="126" y="86" font-family="Arial, sans-serif" font-size="11" fill="#5DC84A" letter-spacing="4">REPRESENTANTE COMERCIAL</text>
</svg>
