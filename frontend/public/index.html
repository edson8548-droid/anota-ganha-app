            // Função para carregar scripts com fallback em caso de erro
            function loadScriptWithSRI(src, integrity, fallback) {
                var script = document.createElement('script');
                script.src = src;
                script.integrity = integrity;
                script.async = true;
                script.crossOrigin = 'anonymous';

                script.onerror = function() {
                    console.error('[SRI] Erro ao carregar script:', src);
                    console.error('[SRI] Integridade falhou. Script não carregado ou servidor comprometido.');
                    // Em produção, não carregar scripts sem SRI
                };

                script.onload = function() {
                    console.log('[SRI] Script carregado com sucesso:', src);
                };

                document.head.appendChild(script);
            }

            // Função para carregar scripts principais (sem SRI em desenvolvimento)
            function loadMainScript(src) {
                var script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.crossOrigin = 'anonymous';
                document.head.appendChild(script);
            }

            // Verificar se é ambiente de desenvolvimento
            const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

            // Only load visual edit scripts when inside an iframe and visual edits are enabled
